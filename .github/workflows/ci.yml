name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: python3 -m pip install pytest

      - name: Run structured template validation
        run: python3 scripts/validate_template.py

      - name: Run test suite
        run: python3 -m pytest tests/ -q

      - name: Run bootstrap smoke tests
        run: |
          python3 scripts/bootstrap_adoption.py "${RUNNER_TEMP}/template-smoke-minimal" --project-name "Smoke Minimal" --profile minimal --project-type cli-tool --dry-run
          python3 scripts/bootstrap_adoption.py "${RUNNER_TEMP}/template-smoke-standard" --project-name "Smoke Standard" --profile standard --project-type backend-api --dry-run
          python3 scripts/bootstrap_adoption.py "${RUNNER_TEMP}/template-smoke-full" --project-name "Smoke Full" --profile full --project-type web-frontend --dry-run
